<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hadiah buat kamu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #f2a7c3;
      --rose2:   #e07ca0;
      --gold:    #f0c97a;
      --gold2:   #c8952a;
      --cream:   #fff5f0;
      --dark:    #08060f;
      --mid:     #16102a;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Cormorant Garamond', serif;
    }

    /* ─── SKY ─── */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 0%, #1a0a2e 0%, transparent 70%),
        radial-gradient(ellipse 90% 70% at 30% 60%, #0d1a2e 0%, transparent 70%),
        linear-gradient(170deg, #08060f 0%, #130820 50%, #08060f 100%);
    }

    /* ─── STARS ─── */
    .stars { position: fixed; inset: 0; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: twinkle var(--t, 3s) var(--d, 0s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%  { opacity: .08; transform: scale(.7); }
      100%{ opacity: var(--op, .9); transform: scale(1); }
    }

    /* ─── AURORA ─── */
    .aurora {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .aurora-band {
      position: absolute;
      width: 200%; height: 180px;
      left: -50%; top: 15%;
      border-radius: 50%;
      filter: blur(55px);
      opacity: 0;
      animation: auroraFlow var(--at, 12s) var(--ad, 0s) ease-in-out infinite alternate;
    }
    .aurora-band:nth-child(1) {
      background: linear-gradient(90deg, transparent, rgba(180,80,200,.18), rgba(100,120,255,.14), transparent);
      --at: 14s; --ad: 0s;
    }
    .aurora-band:nth-child(2) {
      background: linear-gradient(90deg, transparent, rgba(80,200,180,.12), rgba(200,80,150,.12), transparent);
      top: 25%; --at: 18s; --ad: 3s;
    }
    @keyframes auroraFlow {
      0%  { opacity: 0; transform: translateX(-10%) skewX(-5deg); }
      30% { opacity: 1; }
      70% { opacity: .6; }
      100%{ opacity: 0; transform: translateX(10%) skewX(5deg); }
    }

    /* ─── FLOATING PARTICLES ─── */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute;
      width: var(--ps, 4px); height: var(--ps, 4px);
      border-radius: 50%;
      background: var(--pc, rgba(242,167,195,.5));
      animation: particleDrift var(--pt, 8s) var(--pd2, 0s) ease-in-out infinite alternate;
    }
    @keyframes particleDrift {
      0%  { transform: translate(0, 0) scale(1); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: .6; }
      100%{ transform: translate(var(--px, 30px), var(--py, -40px)) scale(.5); opacity: 0; }
    }

    /* ─── GROUND ─── */
    .ground {
      position: fixed; bottom: 0; left: 0; right: 0; height: 80px; z-index: 4;
      background: linear-gradient(to top, #040a04 0%, #0a1a0a 50%, transparent 100%);
    }

    /* ─── FLOWERS CANVAS ─── */
    #flowerCanvas {
      position: fixed; inset: 0; z-index: 1;
      overflow: hidden; pointer-events: none;
    }

    /* flower-unit: flex column → bloom di atas, stem di bawah, tersambung rapi */
    .flower-unit {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: bottom center;
      animation:
        riseUp var(--rise, 3s) var(--rd, 0s) cubic-bezier(.16,1,.3,1) forwards,
        sway   var(--swt, 6s)  var(--swd, 0s) ease-in-out infinite alternate;
      bottom: -400px; opacity: 0;
    }
    @keyframes riseUp {
      0%  { bottom: -400px; opacity: 0; }
      15% { opacity: 1; }
      100%{ bottom: var(--bottom, 55px); opacity: 1; }
    }
    @keyframes sway {
      0%  { transform: rotate(var(--sr, -3deg)); }
      100%{ transform: rotate(var(--sl,  3deg)); }
    }

    /* BUNGA */
    .bloom {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: var(--bw, 56px); height: var(--bw, 56px);
      flex-shrink: 0;
      animation: bloomIn 1.2s var(--bd, 1s) cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes bloomIn {
      0%  { transform: scale(0) rotate(-45deg); opacity: 0; }
      60% { transform: scale(1.15) rotate(6deg); }
      100%{ transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .petal {
      position: absolute;
      width: var(--pw, 20px); height: var(--ph, 28px);
      border-radius: 50% 50% 35% 35%;
      background: var(--pc);
      opacity: .92;
      transform-origin: center bottom;
    }
    .petal:nth-child(1){ transform: rotate(0deg)   translateY(-45%); }
    .petal:nth-child(2){ transform: rotate(72deg)  translateY(-45%); }
    .petal:nth-child(3){ transform: rotate(144deg) translateY(-45%); }
    .petal:nth-child(4){ transform: rotate(216deg) translateY(-45%); }
    .petal:nth-child(5){ transform: rotate(288deg) translateY(-45%); }
    .center {
      position: relative; z-index: 2;
      width: var(--cw, 13px); height: var(--cw, 13px);
      border-radius: 50%;
      background: radial-gradient(circle, #fffcd0 20%, #f5c040 60%, #c07810);
      box-shadow: 0 0 7px 3px rgba(245,185,30,.55);
    }
    .ff {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      background: #ffe566; box-shadow: 0 0 4px 2px rgba(255,220,50,.65);
      animation: ffblink var(--ft, 2s) var(--fd, 0s) ease-in-out infinite alternate;
    }
    @keyframes ffblink {
      0%  { opacity: 0; transform: translate(0,0) scale(.5); }
      100%{ opacity: 1; transform: translate(var(--fx,4px), var(--fy,-5px)) scale(1); }
    }

    /* BATANG — langsung nyambung di bawah bloom tanpa gap */
    .stem {
      width: var(--sw2, 3px);
      height: var(--sh, 150px);
      background: linear-gradient(to top, #183820, #42b870);
      border-radius: 2px 2px 3px 3px;
      position: relative;
      flex-shrink: 0;
    }

    /* DAUN */
    .stem-leaf {
      position: absolute;
      width: var(--lw, 16px); height: var(--lh, 8px);
      background: linear-gradient(135deg, #52cc88, #1e5e34);
      border-radius: 50% 10% 50% 10%;
    }
    .stem-leaf.r {
      right: calc(100% - 1px);
      transform-origin: right center;
      transform: rotate(-35deg);
    }
    .stem-leaf.l {
      left: calc(100% - 1px);
      transform-origin: left center;
      transform: rotate(35deg) scaleX(-1);
    }

    /* ─── GRASS ─── */
    .grass-layer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 3; pointer-events: none; }
    .blade {
      position: absolute; bottom: 0;
      width: var(--bw, 8px); height: var(--bh, 90px);
      background: linear-gradient(to top, var(--bc1, #152815), var(--bc2, #3a9a3a));
      border-radius: 50% 50% 0 0;
      transform-origin: bottom center;
      transform: rotate(var(--br, 0deg)) scaleY(0);
      animation:
        grassRise var(--gr, 1.8s) var(--gd, 0s) cubic-bezier(.22,1,.36,1) forwards,
        grassSway var(--gs, 5s) var(--gsd, 0s) ease-in-out infinite alternate;
    }
    @keyframes grassRise {
      0%  { transform: scaleY(0) rotate(var(--br, 0deg)); opacity: 0; }
      100%{ transform: scaleY(1) rotate(var(--br, 0deg)); opacity: 1; }
    }
    @keyframes grassSway {
      0%  { transform: rotate(calc(var(--br, 0deg) - 4deg)); }
      100%{ transform: rotate(calc(var(--br, 0deg) + 4deg)); }
    }

    /* ─── TITLE ─── */
    .title {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20; text-align: center;
      pointer-events: none; white-space: nowrap;
    }
    .title h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.3rem, 5vw, 2.2rem);
      color: transparent;
      background: linear-gradient(135deg, #f9e0b0, #f2a7c3 40%, #c07ef0 75%, #a0c8f8);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: 1px;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(200,120,240,.7)) drop-shadow(0 2px 8px rgba(0,0,0,.8));
      animation: titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
      0%  { filter: drop-shadow(0 0 12px rgba(200,120,240,.5)) drop-shadow(0 2px 8px rgba(0,0,0,.8)); }
      100%{ filter: drop-shadow(0 0 28px rgba(240,160,200,.85)) drop-shadow(0 0 45px rgba(180,100,255,.4)) drop-shadow(0 2px 8px rgba(0,0,0,.8)); }
    }
    .title .sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(.75rem, 2.5vw, 1rem);
      color: rgba(255,220,200,.55);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ─── PHOTOS WRAP ─── */
    .photos-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 10px 10px 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      pointer-events: none;
      max-width: 480px;
      margin: 0 auto;
      /* perspective untuk efek 3D */
      perspective: 600px;
    }

    .photo-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      width: 100%;
    }

    /* Setiap slot punya 2 animasi: melayang naik-turun + goyang 3D */
    .photo-slot {
      pointer-events: all;
      transform-style: preserve-3d;
      /* float = naik turun, sway = goyang kiri-kanan 3D */
      animation:
        floatUpDown  var(--pf, 6s)   var(--pd, 0s)   ease-in-out infinite alternate,
        floatSway    var(--ps, 8s)   var(--pd2, 0s)  ease-in-out infinite alternate,
        floatTilt    var(--pt2, 9s)  var(--pd3, 0s)  ease-in-out infinite alternate;
    }

    /* Naik-turun dengan shadow berubah (simulasi ketinggian) */
    @keyframes floatUpDown {
      0%  {
        transform: translateY(0px) translateZ(0px);
        filter: drop-shadow(0 6px 10px rgba(0,0,0,.55));
      }
      100%{
        transform: translateY(var(--fy, -14px)) translateZ(var(--fz, 8px));
        filter: drop-shadow(0 18px 22px rgba(0,0,0,.4));
      }
    }

    /* Goyang kiri-kanan dengan perspektif 3D */
    @keyframes floatSway {
      0%  { transform: rotateY(var(--ry1, -6deg)) rotateX(var(--rx1, 2deg)); }
      100%{ transform: rotateY(var(--ry2,  5deg)) rotateX(var(--rx2,-2deg)); }
    }

    /* Rotasi sedikit di Z untuk kesan kertas melayang */
    @keyframes floatTilt {
      0%  { transform: rotate(var(--pr, -3deg)); }
      100%{ transform: rotate(var(--pr2, 3deg)); }
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      border: 1.5px solid rgba(255,255,255,.18);
      box-shadow:
        0 4px 16px rgba(0,0,0,.65),
        inset 0 0 0 1px rgba(255,255,255,.08);
      transition: transform .32s cubic-bezier(.34,1.56,.64,1),
                  box-shadow .32s ease,
                  border-color .28s ease;
      /* sheen light dari atas */
      background: #111;
    }

    /* Sheen — pantulan cahaya di permukaan foto */
    .photo-frame::before {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,.14) 0%,
        rgba(255,255,255,.04) 35%,
        transparent 65%
      );
      border-radius: inherit;
      pointer-events: none;
    }
    .photo-frame::after {
      content: '';
      position: absolute; inset: 0; z-index: 3;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,.35) 100%);
      border-radius: inherit;
      pointer-events: none;
    }

    .photo-frame:hover,
    .photo-frame:active {
      transform: scale(1.15) rotate(0deg) translateY(-6px) !important;
      box-shadow:
        0 20px 45px rgba(0,0,0,.7),
        0 0 0 2.5px rgba(242,167,195,.7),
        0 0 30px rgba(200,120,240,.5),
        inset 0 0 0 1px rgba(255,255,255,.3);
      border-color: rgba(242,167,195,.6);
      z-index: 50;
    }

    .photo-frame img,
    .photo-frame video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* shadow bawah foto — bikin kesan mengambang */
    .photo-slot::after {
      content: '';
      display: block;
      width: 70%; height: 6px;
      background: radial-gradient(ellipse, rgba(0,0,0,.45) 0%, transparent 70%);
      margin: 4px auto 0;
      border-radius: 50%;
      /* shadow ikut animasi float */
      animation: shadowPulse var(--pf, 6s) var(--pd, 0s) ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes shadowPulse {
      0%  { transform: scaleX(1);   opacity: .7; }
      100%{ transform: scaleX(.6);  opacity: .25; }
    }

    /* photo number badge */
    .photo-badge {
      position: absolute;
      bottom: 4px; right: 5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: rgba(255,255,255,.7);
      font-family: 'Cormorant Garamond', serif;
      pointer-events: none;
      z-index: 4;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 360px) {
      .photos-wrap { padding: 8px 8px 0; gap: 5px; }
      .photo-row   { gap: 5px; }
    }
    @media (min-width: 481px) {
      .photos-wrap {
        left: 50%; right: auto;
        transform: translateX(-50%);
      }
    }

    /* ─── LIGHTBOX ─── */
    .lb {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(4,4,12,.92);
      backdrop-filter: blur(18px) saturate(1.5);
      align-items: center; justify-content: center;
    }
    .lb.open { display: flex; animation: lbIn .3s ease; }
    @keyframes lbIn {
      0%  { opacity: 0; }
      100%{ opacity: 1; }
    }
    .lb-media-wrap {
      position: relative;
      animation: lbMediaIn .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes lbMediaIn {
      0%  { transform: scale(.82) translateY(20px); opacity: 0; }
      100%{ transform: scale(1) translateY(0); opacity: 1; }
    }
    .lb img, .lb video {
      max-width: 90vw; max-height: 80vh;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(200,120,240,.35), 0 20px 60px rgba(0,0,0,.8);
      border: 1.5px solid rgba(255,255,255,.18);
      display: block;
    }
    .lb-glow {
      position: absolute; inset: -20px; border-radius: 30px;
      background: radial-gradient(ellipse, rgba(200,100,240,.15) 0%, transparent 70%);
      pointer-events: none; z-index: -1;
    }
    .lb-x {
      position: absolute; top: -14px; right: -14px;
      width: 36px; height: 36px;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: 1rem; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .2s;
    }
    .lb-x:hover { background: rgba(242,167,195,.3); transform: scale(1.1) rotate(90deg); }

    /* ─── HEARTS ─── */
    .hearts-layer { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }

    /* Tipe A — melayang naik lurus sambil fade & goyang */
    .heart-rise {
      position: absolute;
      font-size: var(--hs, 18px);
      opacity: 0;
      will-change: transform, opacity;
      animation:
        hRiseUp   var(--ht, 7s)  var(--hd, 0s) ease-out forwards,
        hWobble   var(--hw, 2.4s) var(--hd, 0s) ease-in-out infinite;
    }
    @keyframes hRiseUp {
      0%   { opacity: 0;  transform: translateY(0)       scale(.4); }
      12%  { opacity: 1; }
      75%  { opacity: .65; }
      100% { opacity: 0;  transform: translateY(-260px)  scale(var(--hs2, .9)); }
    }
    @keyframes hWobble {
      0%  { margin-left: 0; }
      25% { margin-left: var(--hw1, 8px); }
      75% { margin-left: var(--hw2, -8px); }
      100%{ margin-left: 0; }
    }

    /* Tipe B — meledak dari titik tengah layar (burst) */
    .heart-burst {
      position: absolute;
      font-size: var(--hs, 20px);
      opacity: 0;
      will-change: transform, opacity;
      animation: hBurst var(--ht, 1.8s) var(--hd, 0s) cubic-bezier(.25,.46,.45,.94) forwards;
    }
    @keyframes hBurst {
      0%   { opacity: 0;  transform: translate(0,0) scale(0) rotate(0deg); }
      20%  { opacity: 1;  transform: translate(calc(var(--bx,30px)*.3), calc(var(--by,-30px)*.3)) scale(1.3) rotate(var(--br2, 10deg)); }
      70%  { opacity: .7; }
      100% { opacity: 0;  transform: translate(var(--bx,60px), var(--by,-80px)) scale(.5) rotate(var(--br2, 20deg)); }
    }

    /* Tipe C — melayang melingkar pelan di background */
    .heart-orbit {
      position: absolute;
      font-size: var(--hs, 12px);
      opacity: 0;
      animation: hOrbit var(--ht, 12s) var(--hd, 0s) ease-in-out infinite;
    }
    @keyframes hOrbit {
      0%   { opacity: 0;   transform: translateY(0)      rotate(0deg)   scale(.6); }
      10%  { opacity: .55; }
      50%  { opacity: .4;  transform: translateY(-80px)  rotate(180deg) scale(1); }
      90%  { opacity: .2; }
      100% { opacity: 0;   transform: translateY(-160px) rotate(360deg) scale(.4); }
    }

  </style>
</head>
<body>

<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="aurora">
  <div class="aurora-band"></div>
  <div class="aurora-band"></div>
</div>
<div class="particles" id="particles"></div>
<div class="hearts-layer" id="heartsLayer"></div>

<div class="title">
  <h1>Happy Birthday, Sayangku 🎂🤍 </h1>
</div>

<div id="flowerCanvas"></div>
<div class="grass-layer" id="grassLayer"></div>

<!-- ============================================================
     FOTO — ganti src="..." dengan nama file foto/video kamu
     Baris 1: foto 1–4  |  Baris 2: foto 5–8
     ============================================================ -->
<div class="photos-wrap">

  <!-- BARIS 1 -->
  <div class="photo-row">
    <!-- foto 1: lambat, naik tinggi, miring ke kiri -->
    <div class="photo-slot" style="--pf:5.8s;--pd:0s;--ps:9.2s;--pd2:0.3s;--pt2:11s;--pd3:0.7s;--pr:-5deg;--pr2:2deg;--fy:-16px;--fz:10px;--ry1:-8deg;--ry2:5deg;--rx1:3deg;--rx2:-2deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto1.jpg" alt="foto 1">
        <span class="photo-badge"></span>
      </div>
    </div>
    <!-- foto 2: agak cepat, naik sedang -->
    <div class="photo-slot" style="--pf:4.6s;--pd:0.9s;--ps:7.8s;--pd2:1.4s;--pt2:10.5s;--pd3:2s;--pr:3deg;--pr2:-4deg;--fy:-11px;--fz:6px;--ry1:6deg;--ry2:-7deg;--rx1:-2deg;--rx2:3deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto2.jpeg" alt="foto 2">
        <span class="photo-badge"></span>
      </div>
    </div>
    <!-- foto 3: paling lambat, naik paling tinggi -->
    <div class="photo-slot" style="--pf:7.2s;--pd:0.4s;--ps:11s;--pd2:0.8s;--pt2:13s;--pd3:1.2s;--pr:-2deg;--pr2:5deg;--fy:-19px;--fz:12px;--ry1:-5deg;--ry2:9deg;--rx1:2deg;--rx2:-4deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto3.jpeg" alt="foto 3">
        <span class="photo-badge"></span>
      </div>
    </div>
    <!-- foto 4: cepat, naik rendah, goyang banyak -->
    <div class="photo-slot" style="--pf:3.9s;--pd:1.5s;--ps:6.5s;--pd2:2.2s;--pt2:8.5s;--pd3:3s;--pr:6deg;--pr2:-3deg;--fy:-9px;--fz:5px;--ry1:10deg;--ry2:-6deg;--rx1:-3deg;--rx2:2deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto4.jpeg" alt="foto 4">
        <span class="photo-badge"></span>
      </div>
    </div>
  </div>

  <!-- BARIS 2 -->
  <div class="photo-row">
    <!-- foto 5: medium, tilt kanan -->
    <div class="photo-slot" style="--pf:6.4s;--pd:2s;--ps:10s;--pd2:1s;--pt2:12s;--pd3:0.5s;--pr:4deg;--pr2:-6deg;--fy:-14px;--fz:9px;--ry1:7deg;--ry2:-9deg;--rx1:4deg;--rx2:-1deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto5.jpeg" alt="foto 5">
        <span class="photo-badge"></span>
      </div>
    </div>
    <!-- foto 6: lambat, stabil, naik sedang -->
    <div class="photo-slot" style="--pf:5.1s;--pd:0.7s;--ps:8.4s;--pd2:2.8s;--pt2:9.8s;--pd3:1.8s;--pr:-4deg;--pr2:2deg;--fy:-12px;--fz:7px;--ry1:-9deg;--ry2:4deg;--rx1:-2deg;--rx2:3deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto6.jpeg" alt="foto 6">
        <span class="photo-badge"></span>
      </div>
    </div>
    <!-- foto 7: cepat, naik tinggi, goyang aktif -->
    <div class="photo-slot" style="--pf:4.2s;--pd:1.8s;--ps:7s;--pd2:0.2s;--pt2:9s;--pd3:2.5s;--pr:-6deg;--pr2:4deg;--fy:-18px;--fz:11px;--ry1:-11deg;--ry2:7deg;--rx1:3deg;--rx2:-3deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto7.jpeg" alt="foto 7">
        <span class="photo-badge"></span>
      </div>
    </div>
    <!-- foto 8: sangat lambat, gerakan halus -->
    <div class="photo-slot" style="--pf:8.5s;--pd:1.2s;--ps:12s;--pd2:3s;--pt2:14s;--pd3:4s;--pr:2deg;--pr2:-3deg;--fy:-10px;--fz:6px;--ry1:5deg;--ry2:-8deg;--rx1:-1deg;--rx2:4deg">
      <div class="photo-frame" onclick="openLb(this)">
        <img src="foto8.jpeg" alt="foto 8">
        <span class="photo-badge"></span>
      </div>
    </div>
  </div>

</div>
<!-- ============================================================ -->

<div class="ground"></div>

<div class="lb" id="lb">
  <div class="lb-media-wrap">
    <div class="lb-glow"></div>
    <span class="lb-x" id="lbX">✕</span>
    <img id="lbImg" src="" alt="" style="display:none">
    <video id="lbVid" src="" controls autoplay style="display:none;max-width:90vw;max-height:80vh;border-radius:20px;box-shadow:0 0 60px rgba(200,120,240,.35),0 20px 60px rgba(0,0,0,.8);border:1.5px solid rgba(255,255,255,.18)"></video>
  </div>
</div>

<script>
/* ── STARS ── */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 200; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random() * 2.2 + .3;
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*80}%;width:${sz}px;height:${sz}px;position:absolute;border-radius:50%;background:#fff;--t:${2+Math.random()*5}s;--d:${Math.random()*6}s;--op:${.3+Math.random()*.7};`;
  starsEl.appendChild(s);
}

/* ── FLOATING PARTICLES ── */
const particlesEl = document.getElementById('particles');
const pColors = [
  'rgba(242,167,195,.6)','rgba(240,180,100,.5)','rgba(180,140,255,.5)',
  'rgba(140,200,255,.4)','rgba(255,255,200,.4)'
];
for (let i = 0; i < 40; i++) {
  const p = document.createElement('div'); p.className = 'particle';
  const sz = 2 + Math.random() * 4;
  p.style.cssText = `left:${Math.random()*100}%;top:${20+Math.random()*60}%;--ps:${sz}px;--pc:${pColors[Math.floor(Math.random()*pColors.length)]};--pt:${5+Math.random()*10}s;--pd2:${Math.random()*8}s;--px:${-30+Math.random()*60}px;--py:${-50-Math.random()*60}px;`;
  particlesEl.appendChild(p);
}

/* ── HEARTS ── */
const heartsLayer = document.getElementById('heartsLayer');

// Warna-warna love yang cantik
const heartColors = [
  'rgba(255,100,140,.85)',
  'rgba(255,150,180,.8)',
  'rgba(255,80,120,.9)',
  'rgba(242,167,195,.85)',
  'rgba(220,80,160,.8)',
  'rgba(255,200,210,.75)',
  'rgba(200,80,200,.7)',
  'rgba(255,120,100,.8)',
  'rgba(255,170,200,.9)',
  'rgba(180,80,220,.75)',
];

// Simbol love berbagai gaya
const heartSymbols = ['❤️','💗','💖','💝','💕','💓','💞','♥','🩷','💘'];
const smallSymbols  = ['♡','❤','♥','💗','💖','💕'];

// Tipe A: melayang naik dari bawah (banyak & terus-menerus)
function spawnRiseHeart() {
  const h = document.createElement('div');
  h.className = 'heart-rise';
  const useEmoji = Math.random() > .4;
  h.textContent = useEmoji
    ? heartSymbols[Math.floor(Math.random()*heartSymbols.length)]
    : smallSymbols[Math.floor(Math.random()*smallSymbols.length)];
  const x   = 2 + Math.random() * 96;
  const sz  = useEmoji ? 14 + Math.random()*22 : 10 + Math.random()*18;
  const dur = 5 + Math.random() * 6;
  const wob = 1.8 + Math.random() * 1.8;
  const w1  = (-12 + Math.random()*10).toFixed(0);
  const w2  = (2  + Math.random()*12).toFixed(0);
  const col = heartColors[Math.floor(Math.random()*heartColors.length)];
  h.style.cssText = `
    left:${x}%;
    bottom:${55+Math.random()*18}%;
    --hs:${sz}px;
    --ht:${dur}s;
    --hd:0s;
    --hw:${wob}s;
    --hw1:${w1}px;
    --hw2:${w2}px;
    --hs2:${.6+Math.random()*.5};
    color:${col};
  `;
  heartsLayer.appendChild(h);
  setTimeout(() => h.remove(), (dur + .5) * 1000);
}

// Tipe B: meledak tersebar dari tengah-bawah layar (burst periodik)
function spawnBurstHearts() {
  const cx = 30 + Math.random() * 40; // pusat burst
  const cy = 55 + Math.random() * 20;
  const count = 6 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist  = 40 + Math.random() * 90;
      const bx    = Math.round(Math.cos(angle) * dist);
      const by    = Math.round(Math.sin(angle) * dist - dist * .5); // bias atas
      const sz    = 16 + Math.random() * 26;
      const dur   = 1.4 + Math.random() * 1.2;
      const col   = heartColors[Math.floor(Math.random()*heartColors.length)];
      h.style.cssText = `
        left:${cx}%;
        bottom:${cy}%;
        --hs:${sz}px;
        --ht:${dur}s;
        --hd:0s;
        --bx:${bx}px;
        --by:${by}px;
        --br2:${-40+Math.random()*80}deg;
        color:${col};
      `;
      heartsLayer.appendChild(h);
      setTimeout(() => h.remove(), (dur + .3) * 1000);
    }, i * 80);
  }
}

// Tipe C: melayang melingkar pelan, tersebar di seluruh layar
function spawnOrbitHeart() {
  const h = document.createElement('div');
  h.className = 'heart-orbit';
  h.textContent = smallSymbols[Math.floor(Math.random()*smallSymbols.length)];
  const sz  = 8 + Math.random() * 14;
  const dur = 9 + Math.random() * 10;
  const col = heartColors[Math.floor(Math.random()*heartColors.length)];
  h.style.cssText = `
    left:${Math.random()*95}%;
    bottom:${40+Math.random()*30}%;
    --hs:${sz}px;
    --ht:${dur}s;
    --hd:${Math.random()*4}s;
    color:${col};
    font-size:${sz}px;
  `;
  heartsLayer.appendChild(h);
  setTimeout(() => h.remove(), (dur + 5) * 1000);
}

// Mulai spawn
setInterval(spawnRiseHeart,  700);   // naik terus tiap 0.7 detik
setInterval(spawnBurstHearts, 3200); // burst tiap 3.2 detik
setInterval(spawnOrbitHeart,  2200); // orbit tiap 2.2 detik

// Spawn awal langsung
for (let i = 0; i < 8; i++)  setTimeout(spawnRiseHeart,  i * 200);
for (let i = 0; i < 4; i++)  setTimeout(spawnOrbitHeart, i * 500);
setTimeout(spawnBurstHearts, 800);

/* ── GRASS ── */
const grassLayer = document.getElementById('grassLayer');
for (let i = 0; i < 100; i++) {
  const b = document.createElement('div'); b.className = 'blade';
  const h = 30 + Math.random() * 95, w = 3 + Math.random() * 7, rot = -12 + Math.random() * 24;
  const lum = Math.random() > .5;
  b.style.cssText = `left:${Math.random()*100}%;--bh:${h}px;--bw:${w}px;--br:${rot}deg;--bc1:${lum?'#183018':'#0e220e'};--bc2:${lum?'#52b852':'#329a32'};--gr:${.8+Math.random()*.9}s;--gd:${Math.random()*2.5}s;--gs:${3+Math.random()*5}s;--gsd:${Math.random()*4}s;`;
  grassLayer.appendChild(b);
}

/* ── FLOWERS ── */
const PALETTES = [
  'radial-gradient(ellipse at 40% 55%,#fce0f0,#e080b0 55%,#902060)',
  'radial-gradient(ellipse at 40% 55%,#dce8ff,#7098e8 55%,#3050a0)',
  'radial-gradient(ellipse at 40% 55%,#ffeec0,#e0a040 55%,#905010)',
  'radial-gradient(ellipse at 40% 55%,#e8d8ff,#a878e0 55%,#5830a0)',
  'radial-gradient(ellipse at 40% 55%,#d0ffe8,#50d888 55%,#206040)',
  'radial-gradient(ellipse at 40% 55%,#fff0c8,#e0c030 55%,#907010)',
  'radial-gradient(ellipse at 40% 55%,#ffd8e8,#e87090 55%,#982050)',
  'radial-gradient(ellipse at 40% 55%,#c8f4ff,#50b8e8 55%,#206080)',
  'radial-gradient(ellipse at 40% 55%,#ffe0d8,#e07060 55%,#902828)',
  'radial-gradient(ellipse at 40% 55%,#f0ffe0,#90d850 55%,#406020)',
  'radial-gradient(ellipse at 40% 55%,#ffd0f8,#d060c8 55%,#802890)',
];
const flCanvas = document.getElementById('flowerCanvas');
const N = 26;
for (let i = 0; i < N; i++) {
  const baseX = 2 + (i/(N-1)) * 96;
  const x = Math.min(97, Math.max(2, baseX + (-4+Math.random()*8)));
  const sc = .42 + Math.random() * .72;
  const sh = Math.round((100+Math.random()*110)*sc);
  const sw2 = Math.round((2+Math.random()*2)*sc)+1;
  const bw = Math.round((42+Math.random()*30)*sc);
  const pw = Math.round((18+Math.random()*12)*sc);
  const ph = Math.round((24+Math.random()*14)*sc);
  const cw = Math.round((11+Math.random()*9)*sc);
  const lw = Math.round((14+Math.random()*14)*sc);
  const lh = Math.round((8+Math.random()*7)*sc);
  const pc = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  const bottom = 52 + Math.random() * 22;
  const rd = (Math.random()*3.5).toFixed(2);
  const rise = (1.6+Math.random()*1.8).toFixed(2);
  const sr = (-6+Math.random()*2).toFixed(1);
  const sl = (3+Math.random()*6).toFixed(1);
  const swt = (4+Math.random()*5).toFixed(1);
  const swd = (Math.random()*4).toFixed(1);
  const bd = (parseFloat(rd)+parseFloat(rise)*.6).toFixed(2);
  const nLeafPairs = 1 + Math.floor(Math.random()*3);
  let leafHTML = '';
  for (let l = 0; l < nLeafPairs; l++) {
    const ly = Math.round(sh*.18 + l*(sh*.22));
    leafHTML += `<div class="stem-leaf r" style="bottom:${ly}px;--lw:${lw}px;--lh:${lh}px"></div><div class="stem-leaf l" style="bottom:${ly}px;--lw:${lw}px;--lh:${lh}px"></div>`;
  }
  let ffHTML = '';
  const nff = 2 + Math.floor(Math.random()*5);
  for (let f = 0; f < nff; f++) {
    const a = Math.random()*360, d = 16+Math.random()*26;
    const fx = Math.round(Math.cos(a/57.3)*d), fy = Math.round(Math.sin(a/57.3)*d);
    ffHTML += `<div class="ff" style="top:${-6+Math.random()*20}px;left:${-12+Math.random()*24}px;--ft:${1.2+Math.random()*2.5}s;--fd:${Math.random()*3}s;--fx:${fx}px;--fy:${fy}px;"></div>`;
  }
  const u = document.createElement('div'); u.className = 'flower-unit';
  u.style.cssText = `left:${x}%;--bottom:${bottom}px;--rise:${rise}s;--rd:${rd}s;`;
  u.innerHTML = `<div class="bloom" style="--bw:${bw}px;--bd:${bd}s"><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="center" style="--cw:${cw}px"></div>${ffHTML}</div><div class="stem" style="--sh:${sh}px;--sw2:${sw2}px;--swt:${swt}s;--swd:${swd}s;--sr:${sr}deg;--sl:${sl}deg">${leafHTML}</div>`;
  flCanvas.appendChild(u);
}

/* ── LIGHTBOX ── */
const lb = document.getElementById('lb');
const lbImg = document.getElementById('lbImg');
const lbVid = document.getElementById('lbVid');

function openLb(frame) {
  const vid = frame.querySelector('video');
  const img = frame.querySelector('img');
  if (vid) {
    lbVid.src = vid.src;
    lbVid.style.display = 'block';
    lbImg.style.display = 'none';
  } else {
    lbImg.src = img.src;
    lbImg.style.display = 'block';
    lbVid.style.display = 'none';
  }
  lb.classList.add('open');
}
function closeLb() {
  lbVid.pause(); lbVid.src = '';
  lb.classList.remove('open');
}
document.getElementById('lbX').onclick = closeLb;
lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
</script>
</body>
</html>
