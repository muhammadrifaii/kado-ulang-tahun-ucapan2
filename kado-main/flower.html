<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>hadiah buat kamu</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#040810}

    .sky{
      position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse at 55% 25%,#0b1530 0%,#040810 65%);
    }
    .stars{position:absolute;inset:0}
    .star{
      position:absolute;border-radius:50%;background:#fff;
      animation:twinkle var(--t,3s) var(--d,0s) ease-in-out infinite alternate;
    }
    @keyframes twinkle{0%{opacity:.15}100%{opacity:var(--op,1)}}

    .ground{
      position:fixed;bottom:0;left:0;right:0;height:70px;z-index:4;
      background:linear-gradient(to top,#060f06,#0c1e0c 60%,transparent);
    }

    #flowerCanvas{
      position:fixed;inset:0;z-index:1;
      overflow:hidden;pointer-events:none;
    }

    .flower-unit{
      position:absolute;
      transform-origin:bottom center;
      animation:riseUp var(--rise,3s) var(--rd,0s) cubic-bezier(.16,1,.3,1) forwards;
      bottom:-350px;opacity:0;
    }
    @keyframes riseUp{
      0%  {bottom:-350px;opacity:0;transform:scaleX(.8)}
      15% {opacity:1}
      100%{bottom:var(--bottom,60px);opacity:1;transform:scaleX(1)}
    }

    .stem{
      width:var(--sw2,3px);height:var(--sh,180px);
      background:linear-gradient(to top,#1e5030,#4ecfa0);
      margin:0 auto;border-radius:6px 6px 3px 3px;
      position:relative;
      animation:sway var(--swt,6s) var(--swd,0s) ease-in-out infinite alternate;
      transform-origin:bottom center;
    }
    @keyframes sway{
      0%  {transform:rotate(var(--sr,-3deg))}
      100%{transform:rotate(var(--sl,3deg))}
    }

    .stem-leaf{
      position:absolute;
      width:var(--lw,22px);height:var(--lh,12px);
      background:linear-gradient(135deg,#4ecfa0,#226a44);
      border-radius:50% 0 50% 0;
    }
    .stem-leaf.r{right:100%;transform-origin:right center;transform:rotate(-40deg)}
    .stem-leaf.l{left:100%;transform-origin:left center;transform:rotate(40deg) scaleX(-1)}

    .bloom{
      position:relative;display:flex;align-items:center;justify-content:center;
      width:var(--bw,60px);height:var(--bw,60px);margin:0 auto;
      animation:bloomIn 1.4s var(--bd,1s) cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes bloomIn{
      0%  {transform:scale(0) rotate(-50deg);opacity:0}
      65% {transform:scale(1.2) rotate(8deg)}
      100%{transform:scale(1) rotate(0);opacity:1}
    }

    .petal{
      position:absolute;
      width:var(--pw,26px);height:var(--ph,34px);
      border-radius:50% 50% 30% 30%;
      background:var(--pc);opacity:.92;
    }
    .petal:nth-child(1){transform:rotate(0deg)   translateY(calc(var(--ph,34px)*-.44))}
    .petal:nth-child(2){transform:rotate(72deg)  translateY(calc(var(--ph,34px)*-.44))}
    .petal:nth-child(3){transform:rotate(144deg) translateY(calc(var(--ph,34px)*-.44))}
    .petal:nth-child(4){transform:rotate(216deg) translateY(calc(var(--ph,34px)*-.44))}
    .petal:nth-child(5){transform:rotate(288deg) translateY(calc(var(--ph,34px)*-.44))}

    .center{
      position:relative;z-index:2;
      width:var(--cw,16px);height:var(--cw,16px);border-radius:50%;
      background:radial-gradient(circle,#fffcd0,#f5c040 55%,#c07810);
      box-shadow:0 0 8px 3px rgba(245,185,30,.6);
    }

    .ff{
      position:absolute;width:5px;height:5px;border-radius:50%;
      background:#ffe566;box-shadow:0 0 6px 2px rgba(255,220,50,.75);
      animation:ffblink var(--ft,2s) var(--fd,0s) ease-in-out infinite alternate;
    }
    @keyframes ffblink{
      0%{opacity:0;transform:translate(0,0)}
      100%{opacity:1;transform:translate(var(--fx,4px),var(--fy,-6px))}
    }

    .grass-layer{position:fixed;bottom:0;left:0;right:0;z-index:3;pointer-events:none}
    .blade{
      position:absolute;bottom:0;
      width:var(--bw,8px);height:var(--bh,90px);
      background:linear-gradient(to top,var(--bc1,#152815),var(--bc2,#3a9a3a));
      border-radius:50% 50% 0 0;
      transform-origin:bottom center;
      transform:rotate(var(--br,0deg)) scaleY(0);
      animation:
        grassRise var(--gr,1.8s) var(--gd,0s) cubic-bezier(.22,1,.36,1) forwards,
        grassSway var(--gs,5s) var(--gsd,0s) ease-in-out infinite alternate;
    }
    @keyframes grassRise{
      0%  {transform:scaleY(0) rotate(var(--br,0deg));opacity:0}
      100%{transform:scaleY(1) rotate(var(--br,0deg));opacity:1}
    }
    @keyframes grassSway{
      0%  {transform:rotate(calc(var(--br,0deg) - 5deg))}
      100%{transform:rotate(calc(var(--br,0deg) + 5deg))}
    }

    /* ─── FLOATING PHOTOS ─── */
    .photos-wrap{position:fixed;inset:0;z-index:10;pointer-events:none}
    .photo-slot{
      position:absolute;pointer-events:all;
      animation:photoFloat var(--pf,6s) var(--pd,0s) ease-in-out infinite alternate;
    }
    @keyframes photoFloat{
      0%  {transform:translateY(0) rotate(var(--pr,-4deg))}
      100%{transform:translateY(-18px) rotate(var(--pr2,3deg))}
    }

    .photo-frame{
      width:90px;height:90px;border-radius:14px;
      border:2.5px solid rgba(255,255,255,.22);
      overflow:hidden;
      box-shadow:0 4px 22px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.12);
      transition:transform .3s,box-shadow .3s;
      cursor:pointer;
    }
    .photo-frame:hover{
      transform:scale(1.15)!important;
      box-shadow:0 10px 40px rgba(200,120,220,.55),0 0 0 2px rgba(255,255,255,.3);
      z-index:50;
    }
    .photo-frame img{width:100%;height:100%;object-fit:cover;display:block}

    /* ─── TITLE ─── */
    /* SESUDAH */
    .title{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      z-index:20;text-align:center;pointer-events:none;white-space:nowrap;
    }
        .title h1{
      font-family:'Dancing Script',cursive;font-size:2.4rem;
      color:rgba(255,255,255,.88);letter-spacing:2px;
      text-shadow:0 0 28px rgba(200,140,240,.85),0 2px 6px rgba(0,0,0,.6);
    }

    /* ─── LIGHTBOX ─── */
    .lb{display:none;position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
      align-items:center;justify-content:center}
    .lb.open{display:flex}
    .lb img{max-width:82vw;max-height:82vh;border-radius:16px;
      box-shadow:0 0 60px rgba(200,120,240,.4);
      border:2px solid rgba(255,255,255,.2)}
    .lb-x{position:absolute;top:20px;right:28px;
      color:#fff;font-size:2.2rem;cursor:pointer;opacity:.6}
    .lb-x:hover{opacity:1}
  </style>
</head>
<body>

<div class="sky"><div class="stars" id="stars"></div></div>

<div class="title"><h1>Happy birthday sayangku🎂🤍💖</h1></div>

<div id="flowerCanvas"></div>
<div class="grass-layer" id="grassLayer"></div>

<!-- ============================================================
     FOTO-FOTO — ganti src="..." dengan path/URL foto kamu
     Tambah atau kurangi blok <div class="photo-slot"> sesuai kebutuhan
     ============================================================ -->
<div class="photos-wrap">

  <!-- FOTO 1 — pojok kiri atas -->
  <div class="photo-slot" style="top:7%;left:4%;--pf:5.5s;--pd:0s;--pr:-5deg;--pr2:2deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto1.jpg" alt="foto1">
    </div>
  </div>

  <!-- FOTO 2 -->
  <div class="photo-slot" style="top:4%;left:22%;--pf:6.5s;--pd:0.5s;--pr:3deg;--pr2:-3deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto2.jpeg" alt="foto 2">
    </div>
  </div>

  <!-- FOTO 3 — tengah atas -->
  <div class="photo-slot" style="top:7%;left:42%;--pf:5s;--pd:0.9s;--pr:-3deg;--pr2:4deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto3.jpeg" alt="foto 3">
    </div>
  </div>

  <!-- FOTO 4 -->
  <div class="photo-slot" style="top:5%;right:18%;--pf:7s;--pd:0.2s;--pr:5deg;--pr2:-2deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto4.jpeg" alt="foto 4">
    </div>
  </div>

  <!-- FOTO 5 — pojok kanan atas -->
  <div class="photo-slot" style="top:5%;right:3%;--pf:6s;--pd:1.1s;--pr:-4deg;--pr2:3deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto5.jpeg" alt="foto 5">
    </div>
  </div>

  <!-- FOTO 6 — kiri tengah -->
  <div class="photo-slot" style="top:40%;left:1%;--pf:5.8s;--pd:0.6s;--pr:4deg;--pr2:-4deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto6.jpeg" alt="foto 6">
    </div>
  </div>

  <!-- FOTO 7 — kanan tengah -->
  <div class="photo-slot" style="top:37%;right:2%;--pf:6.2s;--pd:1.3s;--pr:-6deg;--pr2:2deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto7.jpeg" alt="foto 7">
    </div>
  </div>

  <!-- FOTO 8 — kiri bawah -->
  <div class="photo-slot" style="top:7%;left:56%;--pf:5.2s;--pd:0.4s;--pr:3deg;--pr2:-5deg">
    <div class="photo-frame" onclick="openLb(this)">
      <img src="foto8.jpeg" alt="foto 8">
    </div>
  </div>

</div>
<!-- ============================================================ -->

<div class="ground"></div>

<div class="lb" id="lb">
  <span class="lb-x" onclick="document.getElementById('lb').classList.remove('open')">✕</span>
  <img id="lbImg" src="" alt="">
</div>

<script>
/* ── STARS ── */
const starsEl=document.getElementById('stars');
for(let i=0;i<170;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.4;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*85}%;width:${sz}px;height:${sz}px;--t:${2+Math.random()*4}s;--d:${Math.random()*5}s;--op:${.4+Math.random()*.6};`;
  starsEl.appendChild(s);
}

/* ── GRASS ── */
const grassLayer=document.getElementById('grassLayer');
for(let i=0;i<90;i++){
  const b=document.createElement('div');b.className='blade';
  const h=35+Math.random()*100,w=4+Math.random()*8,rot=-10+Math.random()*20;
  const lum=Math.random()>.5;
  b.style.cssText=`left:${Math.random()*100}%;--bh:${h}px;--bw:${w}px;--br:${rot}deg;--bc1:${lum?'#1a4a1a':'#0f2a0f'};--bc2:${lum?'#4aaa4a':'#2a7a2a'};--gr:${1+Math.random()*.8}s;--gd:${Math.random()*2.5}s;--gs:${3.5+Math.random()*5}s;--gsd:${Math.random()*4}s;`;
  grassLayer.appendChild(b);
}

/* ── FLOWERS ── */
const PALETTES=[
  'radial-gradient(ellipse at 40% 55%,#f8d0e8,#d07098 55%,#883060)',
  'radial-gradient(ellipse at 40% 55%,#d0e8ff,#6090d8 55%,#304890)',
  'radial-gradient(ellipse at 40% 55%,#ffe8c0,#d89840 55%,#885010)',
  'radial-gradient(ellipse at 40% 55%,#e0d0ff,#9870d0 55%,#503090)',
  'radial-gradient(ellipse at 40% 55%,#c8ffe0,#48c878 55%,#186038)',
  'radial-gradient(ellipse at 40% 55%,#fff0c0,#d8b028 55%,#806008)',
  'radial-gradient(ellipse at 40% 55%,#ffd0e8,#e06090 55%,#903060)',
  'radial-gradient(ellipse at 40% 55%,#c8f0ff,#48a8d8 55%,#185880)',
  'radial-gradient(ellipse at 40% 55%,#ffe0e0,#d86060 55%,#882020)',
  'radial-gradient(ellipse at 40% 55%,#f0ffe0,#88d848 55%,#386018)',
];
const canvas=document.getElementById('flowerCanvas');
const N=24;
for(let i=0;i<N;i++){
  const baseX=2+(i/(N-1))*96;
  const x=Math.min(97,Math.max(2,baseX+(-4+Math.random()*8)));
  const sc=.45+Math.random()*.75;
  const sh=Math.round((110+Math.random()*100)*sc);
  const sw2=Math.round((2+Math.random()*2)*sc)+1;
  const bw=Math.round((44+Math.random()*28)*sc);
  const pw=Math.round((20+Math.random()*10)*sc);
  const ph=Math.round((26+Math.random()*12)*sc);
  const cw=Math.round((12+Math.random()*8)*sc);
  const lw=Math.round((16+Math.random()*12)*sc);
  const lh=Math.round((9+Math.random()*6)*sc);
  const pc=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  const bottom=50+Math.random()*25;
  const rd=(Math.random()*3.5).toFixed(2);
  const rise=(1.8+Math.random()*1.6).toFixed(2);
  const sr=(-6+Math.random()*2).toFixed(1);
  const sl=(3+Math.random()*6).toFixed(1);
  const swt=(4+Math.random()*5).toFixed(1);
  const swd=(Math.random()*4).toFixed(1);
  const bd=(parseFloat(rd)+parseFloat(rise)*.6).toFixed(2);
  const nLeafPairs=1+Math.floor(Math.random()*3);
  let leafHTML='';
  for(let l=0;l<nLeafPairs;l++){
    const ly=Math.round(sh*.18+l*(sh*.22));
    leafHTML+=`<div class="stem-leaf r" style="bottom:${ly}px;--lw:${lw}px;--lh:${lh}px"></div><div class="stem-leaf l" style="bottom:${ly}px;--lw:${lw}px;--lh:${lh}px"></div>`;
  }
  let ffHTML='';
  const nff=2+Math.floor(Math.random()*5);
  for(let f=0;f<nff;f++){
    const a=Math.random()*360,d=18+Math.random()*28;
    const fx=Math.round(Math.cos(a/57.3)*d),fy=Math.round(Math.sin(a/57.3)*d);
    ffHTML+=`<div class="ff" style="top:${-8+Math.random()*24}px;left:${-14+Math.random()*28}px;--ft:${1.2+Math.random()*2.2}s;--fd:${Math.random()*3}s;--fx:${fx}px;--fy:${fy}px;"></div>`;
  }
  const u=document.createElement('div');u.className='flower-unit';
  u.style.cssText=`left:${x}%;--bottom:${bottom}px;--rise:${rise}s;--rd:${rd}s;--sh:${sh}px;--sw2:${sw2}px;--swt:${swt}s;--swd:${swd}s;--sr:${sr}deg;--sl:${sl}deg;`;
  u.innerHTML=`<div class="bloom" style="--bw:${bw}px;--bd:${bd}s"><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="petal" style="--pw:${pw}px;--ph:${ph}px;--pc:${pc}"></div><div class="center" style="--cw:${cw}px"></div>${ffHTML}</div><div class="stem" style="--sh:${sh}px;--sw2:${sw2}px;--swt:${swt}s;--swd:${swd}s;--sr:${sr}deg;--sl:${sl}deg">${leafHTML}</div>`;
  canvas.appendChild(u);
}

/* ── LIGHTBOX ── */
const lb=document.getElementById('lb');
const lbImg=document.getElementById('lbImg');
function openLb(frame){
  lbImg.src=frame.querySelector('img').src;
  lb.classList.add('open');
}
lb.addEventListener('click',e=>{if(e.target===lb)lb.classList.remove('open')});
</script>
</body>
</html>
